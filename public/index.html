<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💧 飲水紀錄 | Drank a Glass?</title>
    <!-- Modern font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Visual wave effect background -->
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
        
        <button id="user-auth-btn" class="user-auth-btn" title="使用者選單">👤 未登入</button>
        <button id="admin-toggle-btn" class="calendar-toggle-btn admin-btn" title="管理設定" style="display: none;">⚙️</button>
        <button id="calendar-toggle-btn" class="calendar-toggle-btn" title="查看紀錄">📅</button>
        <div class="content">
            <div class="header">
                <h1 id="main-title">今日飲水紀錄</h1>
                <p id="main-subtitle">保持水分，保持健康</p>
                <button id="back-today-btn" class="back-today-btn">返回今日 <small>↩</small></button>
            </div>
            
            <div class="counter-display">
                <div id="water-fill" class="water-fill"></div>
                <div class="counter-text">
                    <span class="count" id="water-count">0</span>
                    <span class="unit">杯</span>
                </div>
            </div>
            
            <button id="drink-btn" class="drink-btn">
                <span class="btn-text" id="drink-btn-text">喝了一杯水</span>
                <span class="btn-icon">💧</span>
            </button>
            
            <button id="remove-btn" class="remove-btn">
                <span class="btn-text" id="remove-btn-text">減少一杯水</span>
                <span class="btn-icon">🚱</span>
            </button>
            
            <div id="status-message" class="status-message"></div>
        </div>
    </div>
    
    <!-- Calendar Modal -->
    <div id="calendar-modal" class="modal">
        <div class="modal-content">
            <span id="close-modal" class="close-btn">&times;</span>
            <div class="calendar-header">
                <button id="prev-month-btn" class="month-nav-btn">&lt;</button>
                <h2 id="calendar-month-title">年份 月份</h2>
                <button id="next-month-btn" class="month-nav-btn">&gt;</button>
            </div>
            <div class="calendar-weekdays">
                <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
            </div>
            <div id="calendar-grid" class="calendar-grid">
                <!-- Days will be generated by JS -->
            </div>
        </div>
    </div>

    <!-- Admin Modal -->
    <div id="admin-modal" class="modal">
        <div class="modal-content">
            <span id="close-admin-modal" class="close-btn">&times;</span>
            <div class="calendar-header" style="justify-content: center;">
                <h2>⚙️ 管理員控制中心</h2>
            </div>
            <div class="admin-user-list-container">
                <ul id="admin-user-list" class="admin-user-list">
                    <!-- Users will be populated here -->
                </ul>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
